<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Particles Visualizer</title>

    <!-- Required for the built-in control panel (showControls) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

    <!-- The library (UMD build, tsparticles bundled in) -->
    <script src="../dist/audio-visualizer.js"></script>
</head>
<body class="bg-black min-h-screen overflow-hidden">
    <!-- Visualization Container -->
    <div id="particles-js" class="fixed inset-0 z-0"></div>

    <div class="relative z-10 max-w-md mx-auto mt-8 p-6 text-center text-white pointer-events-none">
        <h1 class="text-2xl font-bold">Audio Particles Visualizer</h1>
        <p class="text-gray-400 text-sm mt-2">
            Open the <i class="fas fa-cog"></i> panel (top right) to load a file or URL and play.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const visualizer = new AudioVisualizer.default({
                container: '#particles-js',
                showControls: true,
                settings: {
                    sensitivity: 1.0,
                    particleCount: 50
                }
            });
            window.visualizer = visualizer; // for tinkering in the console
        });
    </script>
</body>
</html>
